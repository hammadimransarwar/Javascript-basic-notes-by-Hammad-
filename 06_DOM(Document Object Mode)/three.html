<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM|Chai aur code</title>
</head>
<body style="background-color: rgba(0, 0, 0, 0.42); color:rgb(216, 210, 210)">
    
</body>
<script>
    const div = document. createElement('div')
    div.className = "main"
    console.log(div);
    div.id = Math.floor(Math. random() * 10 + 1)
    div.setAttribute("title","First Title")
    div.style.backgroundColor="Green"
    div.innerHTML="TESTING"
    document.body.appendChild(div) //document.body.appendChild(div) is used to programmatically add a newly created element (like a div) as the last child of the <body> element, making it visible and part of the active DOM tree.
    //Without it is likr in memory but not in dom tree
</script>
</html>
