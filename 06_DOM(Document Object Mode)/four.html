<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 4|CHAI AUR CODE</title>
</head>
<body style="background-color: black; color: antiquewhite;">
<ul class="language">
    <li> Javascript</li>
</ul>
</body>
<script>
    function add_lang(lan_name){
        const li=document.createElement('li')
        li.innerHTML=`${lan_name}`
        document.querySelector('.language').appendChild(li);
    }
    add_lang("Python")
    add_lang("Ruby")
    function addOptiLanguage (langName) {
        const li = document. createElement ('li');
        li. appendChild(document. createTextNode (langName) )
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("H++");// no lan but just for fun
    //edit innerhtml
    const second=document.querySelector('li:nth-child(2)')
    second.innerHTML='C#'
    //edit outerhtml
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>TypeScript</li>'
    //remove
    const lastLang = document. querySelector( 'li:last-child')
    lastLang.remove( ) 
</script>
</html>
